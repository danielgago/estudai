name: Windows Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Install packaging tools
        run: uv pip install --python .venv\Scripts\python.exe cx-Freeze

      - name: Build MSI installer
        run: uv run python -m cx_Freeze bdist_msi

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts | Out-Null
          $msi = Get-ChildItem -Path . -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            throw "MSI file not found."
          }
          Copy-Item $msi.FullName -Destination artifacts/
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: artifacts/*
          retention-days: 14

      - name: Attach assets to draft prerelease
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/*.msi
